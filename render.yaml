services:
  - type: web
    name: mclean-app
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mclean-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "mclean-app.onrender.com"

databases:
  - name: mclean-db
    plan: free
