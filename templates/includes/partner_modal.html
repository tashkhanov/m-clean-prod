<!-- PARTNER MODAL with Swiper before/after slider -->
<div class="modal-overlay" id="partner-modal">
    <div class="modal modal--partner">
        <button class="modal__close" aria-label="Закрыть" onclick="closePartnerModal()">&times;</button>

        <div id="partner-modal-inner">
            <div id="partner-modal-loader" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px;">
                <div class="loader"></div>
                <p style="margin-top: 16px; color: var(--color-text-muted);">Загрузка работ...</p>
            </div>

            <div id="partner-modal-content" style="display: none;">
                <div class="partner-modal-header">
                    <img id="partner-modal-logo" src="" alt="" style="max-height: 60px; max-width: 200px; object-fit: contain; margin-bottom: 8px;">
                    <h3 class="modal__title" id="partner-modal-title"></h3>
                    <p id="partner-modal-desc" style="color: var(--color-text-muted); font-size: 0.9rem; margin-top: 4px;"></p>
                </div>

                <div id="partner-no-works" style="display: none; text-align: center; padding: 40px 20px; color: var(--color-text-muted);">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity: 0.4; margin-bottom: 12px;"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 16l4-4 4 4"/><circle cx="9" cy="9" r="1"/></svg>
                    <p>У этого партнера пока нет загруженных примеров работ.</p>
                </div>

                <!-- Swiper for partner works -->
                <div id="partner-works-swiper-wrap" style="display: none; margin-top: 20px; position: relative;">
                    <div class="swiper partner-works-swiper">
                        <div class="swiper-wrapper" id="partner-works-swiper-slides"></div>
                        <div class="swiper-button-prev partner-works-prev"></div>
                        <div class="swiper-button-next partner-works-next"></div>
                    </div>
                    <p style="text-align: center; font-size: 12px; color: var(--color-text-muted); margin-top: 12px;">
                        ← Потяните ползунок чтобы сравнить До/После →
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.modal--partner {
    max-width: 860px;
    width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    padding: 32px;
}

.partner-modal-header {
    text-align: center;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--color-border);
}

/* Partner Works Swiper */
.partner-works-swiper {
    width: 100%;
    border-radius: var(--radius-lg);
    overflow: hidden;
}

.partner-works-swiper .swiper-slide {
    border-radius: var(--radius-lg);
    overflow: hidden;
}

/* Before/After Slider inside each slide */
.pw-ba-slider {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 10;
    overflow: hidden;
    cursor: ew-resize;
    user-select: none;
    background: #000;
}

.pw-ba-slider img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
}

.pw-ba-slider__before {
    clip-path: inset(0 50% 0 0);
    z-index: 2;
}

.pw-ba-slider__after {
    z-index: 1;
}

.pw-ba-slider__handle {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 3px;
    background: white;
    z-index: 10;
    box-shadow: 0 0 8px rgba(0,0,0,0.4);
    cursor: ew-resize;
}

.pw-ba-slider__knob {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 40px;
    background: var(--color-brand);
    border: 3px solid white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    flex-shrink: 0;
}

.pw-ba-label {
    position: absolute;
    bottom: 14px;
    background: rgba(0,0,0,0.55);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 12px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    z-index: 5;
    pointer-events: none;
}
.pw-ba-label--before { left: 14px; }
.pw-ba-label--after  { right: 14px; background: var(--color-brand); }

.pw-work-title {
    background: var(--color-bg-alt);
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    border-top: 1px solid var(--color-border);
}

/* Single image fallback */
.pw-single-img {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 10;
    overflow: hidden;
    background: #000;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.pw-single-img img {
    width: 100%; height: 100%; object-fit: cover;
}

/* Swiper nav */
.partner-works-swiper .swiper-button-prev,
.partner-works-swiper .swiper-button-next {
    color: white;
    background: rgba(0,0,0,0.45);
    width: 40px; height: 40px;
    border-radius: 50%;
    top: calc(50% - 40px);
}
.partner-works-swiper .swiper-button-prev::after,
.partner-works-swiper .swiper-button-next::after {
    font-size: 16px;
}

.partner-works-swiper .swiper-pagination-bullet-active {
    background: var(--color-brand);
}

.loader {
    border: 4px solid var(--color-border);
    border-top: 4px solid var(--color-brand);
    border-radius: 50%;
    width: 36px; height: 36px;
    animation: spin 0.9s linear infinite;
    margin: 0 auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@media (max-width: 600px) {
    .modal--partner { padding: 20px 16px; }
    .pw-ba-slider__knob { width: 30px; height: 30px; }
}
</style>

<script>
var _partnerBaSwiperInstance = null;

function openPartnerModal(partnerId) {
    var modal = document.getElementById('partner-modal');
    var loader = document.getElementById('partner-modal-loader');
    var content = document.getElementById('partner-modal-content');
    var title = document.getElementById('partner-modal-title');
    var logo = document.getElementById('partner-modal-logo');
    var desc = document.getElementById('partner-modal-desc');
    var noWorks = document.getElementById('partner-no-works');
    var swiperWrap = document.getElementById('partner-works-swiper-wrap');
    var slidesContainer = document.getElementById('partner-works-swiper-slides');

    modal.classList.add('active');
    document.body.style.overflow = 'hidden';

    loader.style.display = 'flex';
    content.style.display = 'none';

    // Destroy old swiper
    if (_partnerBaSwiperInstance) {
        _partnerBaSwiperInstance.destroy(true, true);
        _partnerBaSwiperInstance = null;
    }

    fetch('/api/partners/' + partnerId + '/works/')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            loader.style.display = 'none';
            content.style.display = 'block';

            title.textContent = data.partner_name || 'Партнер';
            if (data.partner_logo) {
                logo.src = data.partner_logo;
                logo.alt = data.partner_name;
                logo.style.display = 'block';
            } else {
                logo.style.display = 'none';
            }
            desc.textContent = data.partner_description || '';

            if (data.works && data.works.length > 0) {
                noWorks.style.display = 'none';
                swiperWrap.style.display = 'block';
                slidesContainer.innerHTML = '';

                data.works.forEach(function(work) {
                    var slide = document.createElement('div');
                    slide.className = 'swiper-slide';

                    if (work.image_before && work.image_after) {
                        slide.innerHTML =
                            '<div class="pw-ba-slider swiper-no-swiping" data-percent="50">' +
                                '<img src="' + work.image_after + '" alt="После" class="pw-ba-slider__after">' +
                                '<img src="' + work.image_before + '" alt="До" class="pw-ba-slider__before">' +
                                '<div class="pw-ba-slider__handle">' +
                                    '<div class="pw-ba-slider__knob">' +
                                        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3l-5 9 5 9M16 3l5 9-5 9"/></svg>' +
                                    '</div>' +
                                '</div>' +
                                '<span class="pw-ba-label pw-ba-label--before">До</span>' +
                                '<span class="pw-ba-label pw-ba-label--after">После</span>' +
                            '</div>' +
                            '<div class="pw-work-title">' + (work.title || '') + '</div>';
                    } else {
                        var imgSrc = work.image_after || work.image_before || '';
                        slide.innerHTML =
                            '<div class="pw-single-img"><img src="' + imgSrc + '" alt="' + (work.title || '') + '"></div>' +
                            '<div class="pw-work-title">' + (work.title || '') + '</div>';
                    }

                    slidesContainer.appendChild(slide);
                });

                // Init Swiper
                _partnerBaSwiperInstance = new Swiper('.partner-works-swiper', {
                    slidesPerView: 1,
                    spaceBetween: 0,
                    loop: data.works.length > 1,
                    navigation: {
                        prevEl: '.partner-works-prev',
                        nextEl: '.partner-works-next',
                    },
                });

                // Init before/after sliders
                initPartnerBaSliders();

            } else {
                noWorks.style.display = 'block';
                swiperWrap.style.display = 'none';
            }
        })
        .catch(function(err) {
            loader.style.display = 'none';
            content.style.display = 'block';
            title.textContent = 'Ошибка';
            noWorks.textContent = 'Не удалось загрузить данные.';
            noWorks.style.display = 'block';
            swiperWrap.style.display = 'none';
            console.error(err);
        });
}

function initPartnerBaSliders() {
    var sliders = document.querySelectorAll('#partner-works-swiper-slides .pw-ba-slider');
    sliders.forEach(function(slider) {
        var beforeImg = slider.querySelector('.pw-ba-slider__before');
        var handle = slider.querySelector('.pw-ba-slider__handle');
        var pct = 50;
        var dragging = false;

        function setPos(x) {
            var rect = slider.getBoundingClientRect();
            pct = Math.max(0, Math.min(100, ((x - rect.left) / rect.width) * 100));
            beforeImg.style.clipPath = 'inset(0 ' + (100 - pct) + '% 0 0)';
            handle.style.left = pct + '%';
        }

        slider.addEventListener('mousedown', function(e) { dragging = true; setPos(e.clientX); e.preventDefault(); });
        slider.addEventListener('click', function(e) { setPos(e.clientX); });
        document.addEventListener('mouseup', function() { dragging = false; });
        document.addEventListener('mousemove', function(e) { if (dragging) setPos(e.clientX); });

        slider.addEventListener('touchstart', function(e) { dragging = true; setPos(e.touches[0].clientX); }, { passive: true });
        document.addEventListener('touchend', function() { dragging = false; });
        document.addEventListener('touchmove', function(e) { if (dragging) setPos(e.touches[0].clientX); }, { passive: false });
    });
}

function closePartnerModal() {
    document.getElementById('partner-modal').classList.remove('active');
    document.body.style.overflow = '';
}

document.getElementById('partner-modal').addEventListener('click', function(e) {
    if (e.target === this) closePartnerModal();
});
</script>
