{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="error-page">
    <div class="container">
        <div class="error-page__content">
            <div class="error-page__glass">
                <h1 class="error-page__code">404</h1>
                <h2 class="error-page__title">Страница не найдена</h2>
                <p class="error-page__text">Возможно, она была удалена или перенесена на другой адрес.</p>
                <div class="error-page__actions">
                    <a href="/" class="btn btn--primary btn--large">Вернуться на главную</a>
                    <a href="{% url 'services:services' %}" class="btn btn--ghost btn--large">Наши услуги</a>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}

{% block extra_css %}
<style>
.error-page {
    min-height: calc(100vh - var(--header-height) - 200px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-3xl) 0;
    background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 50%, #f0fdf4 100%);
}

.error-page__content {
    text-align: center;
    max-width: 600px;
    margin: 0 auto;
}

.error-page__glass {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: var(--radius-xl);
    padding: var(--space-3xl);
    box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.06),
        0 20px 60px rgba(0, 0, 0, 0.04);
}

.error-page__code {
    font-size: 120px;
    font-weight: 800;
    color: var(--color-brand);
    line-height: 1;
    margin-bottom: var(--space-md);
    background: linear-gradient(135deg, var(--color-brand) 0%, var(--color-brand-light) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.error-page__title {
    font-size: 28px;
    font-weight: 700;
    color: var(--color-text-main);
    margin-bottom: var(--space-md);
}

.error-page__text {
    font-size: 16px;
    color: var(--color-text-muted);
    margin-bottom: var(--space-xl);
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
}

.error-page__actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: var(--space-md);
}

@media (max-width: 768px) {
    .error-page__code {
        font-size: 80px;
    }
    
    .error-page__title {
        font-size: 24px;
    }
    
    .error-page__glass {
        padding: var(--space-xl);
    }
    
    .error-page__actions {
        flex-direction: column;
    }
    
    .error-page__actions .btn {
        width: 100%;
    }
}
</style>
{% endblock %}
